# Home-Assistant-Add-on-Manifest.
# Liegt im Repo-Root, damit der Build-Kontext frontend/ und backend/ erreicht.
name: WebDashboardHA
version: "0.1.1"
slug: webdashboardha
description: Steuerbares, iPad-Air-1-taugliches Web-Dashboard für Home Assistant
url: https://github.com/DEIN-USER/WebDashboardHA
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: application
boot: auto

# Ingress: erscheint in der HA-Sidebar (zum Bauen/Bearbeiten der Dashboards).
ingress: true
ingress_port: 8099
panel_icon: mdi:view-dashboard-edit
panel_title: Dashboard

# Eigener Port für den PWA-Kiosk am Wand-iPad (Add-to-Homescreen, Vollbild).
# Auf dem iPad: http://<ha-host>:8099
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Kiosk-/PWA-Zugriff fürs iPad (LAN)

# Persistentes Volume für Dashboard-Layouts (JSON).
map:
  - data:rw

# Der Supervisor injiziert SUPERVISOR_TOKEN automatisch (hassio_api/homeassistant_api).
hassio_api: true
homeassistant_api: true
