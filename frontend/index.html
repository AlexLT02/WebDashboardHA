<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover + user-scalable=no: Vollbild-Kiosk ohne Zoom-Wackeln auf dem iPad -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0"
    />

    <!-- PWA / Add-to-Homescreen: Vollbild ohne URL-Leiste. Diese alten
         apple-* Tags sind das, was iOS 12 Safari versteht. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HA Dashboard" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0f1115" />

    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />

    <title>HA Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
